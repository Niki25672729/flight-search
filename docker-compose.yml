x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: infrastructure/docker/airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    FLIGHT_SEARCH_GCS_BUCKET: ${FLIGHT_SEARCH_GCS_BUCKET}
    GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcloud/application_default_credentials.json
    # Real host path (not a path inside this container) — DockerOperator launches
    # sibling containers via the Docker socket, so its own volume mounts are
    # resolved by the host daemon, not relative to this container's filesystem.
    HOST_GCLOUD_ADC_PATH: ${HOME}/.config/gcloud/application_default_credentials.json
  volumes:
    - ./infrastructure/airflow/dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ${HOME}/.config/gcloud/application_default_credentials.json:/opt/airflow/gcloud/application_default_credentials.json:ro
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
        --username admin --password admin
        --firstname Admin --lastname User
        --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # Not started by `docker-compose up` (gated behind the "tools" profile) — this is
  # the image DockerOperator launches per scheduled run. Build with
  # `docker-compose build ingestion`; run ad hoc with
  # `docker-compose run --rm ingestion <origin> <run_date>` or
  # `docker-compose run --rm ingestion retry <origin> <run_date>` — see run.py's main()
  # For a loop-all-origins retry, use manual_run.py's entrypoint instead.
  ingestion:
    build:
      context: .
      dockerfile: infrastructure/docker/ingestion/Dockerfile
    image: flight-search-ingestion:dev
    profiles: ["tools"]
    environment:
      FLIGHT_SEARCH_GCS_BUCKET: ${FLIGHT_SEARCH_GCS_BUCKET}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/app/gcloud/application_default_credentials.json:ro

volumes:
  postgres-db-volume:
